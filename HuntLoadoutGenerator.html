<!DOCTYPE html>
<html>
<head>
    <title>Hunt Showdown Loadout Generator</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #ffffff;
            height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
        }
        h1 {
           font-size: 80%;
        }

        p {
           font-family: Chiller;
           line-height: 0.95;
           font-size: 90%;
        }
        
        .loadout-container {
            text-align: center;
            font-size: 3vw;
            padding: 20px;
            border: 2px solid #8b4513;
            border-radius: 10px;
            background-color: #2a2a2a;
            max-width: 80%;
        }
        
        button {
            margin-top: 20px;
            padding: 15px 30px;
            font-size: 1.5vw;
            background-color: #8b4513;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        
        button:hover {
            background-color: #6b3410;
        }
    </style>
</head>
<body>
    <div class="loadout-container" id="loadout"></div>
    <label><input type="checkbox" name="traitCheck" value="Quartermaster">Using Quartermaster</label>
    <button onclick="generateLoadout()">Generate New Loadout</button>

    <script>
        const largeWeapons = ["Frontier 73C","Frontier 73C Silencer","Frontier 73C Marksman","Infantry 73L","Infantry 73L Bayonet",
                              "Infantry 73L Sniper","Marathon","Marathon Swift","Ranger 73","Ranger 73 Aperture","Ranger 73 Talon",
                              "Ranger 73 Swift","LeMat Carbine","LeMat Carbine Marksman","1865 Carbine","Officer Carbine",
                              "Officer Carbine Deadeye","1865 Carbine Aperture","1865 Carbine Silencer","Centennial","Centennial Sniper",
                              "Centennial Trauma","Drilling","Maynard Sniper","Maynard Sniper Silencer","Springfield 1866",
                              "Springfield 1866 Marksman","Springfield 1866 Bayonet","Vetterli 71","Vetterli 71 Deadeye",
                              "Vetterli 71 Marksman","Vetterli 71 Bayonet","Vetterli 71 Silencer","Vetterli 71 Cyclone","Berthier 1892",
                              "Berthier 1892 Riposte","Berthier 1892 Deadeye","Berthier 1892 Marksman","Krag", "Krag Bayonet",
                              "Krag Sniper","Krag Silencer","Lebel 1886","Lebel 1886 Aperture","Lebel 1886 Talon","Lebel 1886 Marksman",
                              "Mako 1895","Mako 1895 Claw","Mako 1895 Aperture","Martini-Henry","Martini-Henry Deadeye",
                              "Martini-Henry Riposte","Martini-Henry Marksman","Martini-Henry Ironside","Mosin Obrez Match",
                              "Mosin Obrez Sharpeye","Mosin-Nagant","Mosin-Nagant Bayonet","Mosin-Nagant Sniper","Mosin-Nagant Avtomat",
                              "Sparks","Sparks Silencer","Sparks Sniper","Auto-5","Rival 78","Rival 78 Trauma","Romero 77","Romero 77 Talon",
                              "Romero 77 Alamo","Slate","Slate Riposte","Specter 1882","Specter 1882 Bayonet","Terminus","Bomb Lance",
                              "Crossbow","Crossbow Deadeye","Nitro Express"];
        
        const mediumWeapons = ["Vandal 73C","Vandal 73C Striker","Vandal 73C Bullseye","Bornheim No.3 Match","Nagant M1895 Precision",
                               "Nagant M1895 Deadeye","Centennial Shorty","Centennial Shorty Silencer","Drilling Shorty","Drilling Hatchet",
                               "Springfield 1866 Shorty","Springfield 1866 Striker","Springfield 1866 Bullseye","Scottfield Precision",
                               "Mosin Obrez","Mosin Obrez Mace","Mosin Obrez Extended","Uppercut Precision","Uppercut Deadeye","Auto-4 Shorty",
                               "Rival 78 Shorty","Rival 78 Mace","Romero 77 Shorty","Romero 77 Hatchet","Specter 1882 Shorty","Terminus Shorty",
                               "Bomb Launcher","Chu Ko Nu","Dolch 96 Precision","Hunting Bow"];
        
        const smallWeapons = ["Bornheim No.3","Bornheim No.3 Silencer","Bornheim No.3 Extended","Conversion","Conversion Chain Pistol",
                              "LeMat","Nagant M1895","Nagant M1895 Silencer","New Army","New Army Swift","Officer","Officer Brawler",
                              "Pax","Pax Claw","Pax Trueshot","Scottfield","Scottfield Brawler","Scottfield Spitfire","Scottfield Swift",
                              "Sparks Pistol","Sparks Pistol Silencer","Haymaker","Uppercut","Dolch 96","Dolch 96 Claw","Dolch 96 Bullseye",
                              "Hand Crossbow","Baseball Bat","Cavalry Saber","Combat Axe","Katana","Machete","Railroad Hammer"];
        
        const noDualWield = ["Baseball Bat","Cavalry Saber","Combat Axe","Katana","Machete","Railroad Hammer"];
        const consumables = ["Ammo Box","Tool Box","Fire Bomb","Hellfire Bomb","Liquid Fire Bomb","Dynamite Stick","Dynamite Bundle",
                             "Waxed Dynamite Stick","Big Dynamite Bundle","Sticky Bomb","Frag Bomb","Dark Dynamite Satchel","Hive Bomb",
                             "Poison Bomb","Chaos Bomb","Antidote Shot","Antidote Shot (Weak)","Regeneration Shot","Regeneration Shot (Weak)",
                             "Stamina Shot","Stamina Shot (Weak)","Medical Pack","Vitality Shot","Vitality Shot (Weak)","Recovery Shot",
                             "Stalker Beetle","Choke Beetle","Fire Beetle","Concertina Bomb","Flash Bomb"];
        
        const tools = ["Blank Fire Decoys","Decoys","Decoy Fuses","First Aid Kit","Flare Pistol","Fusees","Dusters","Heavy Knife","Knife",
                       "Knuckle Knife","Throwing Axes","Throwing Knives","Throwing Spear","Derringer Pennyshot","Quad Derringer",
                       "Alert Trip Mines","Concertina Trip Mines","Poison Trip Mines","Bear Traps","Choke Bombs","Spyglass"];

        function generateLoadout() {
            let second_weapon;
            let tools_loadout = [];
            let consumables_loadout = [];
            let weapon_slot_budget = 4;

            if (traitCheck == "Quartermaster") {
                weapon_slot_budget = 5;
            }
            
            const first_weapon_type = Math.floor(Math.random() * 3) + 1;
            let first_weapon;

            if (first_weapon_type === 1) {
                const dual = Math.floor(Math.random() * 2);
                let non_dual_catch = smallWeapons[Math.floor(Math.random() * smallWeapons.length)];
                
                if (dual === 0) {
                    first_weapon = non_dual_catch;
                    weapon_slot_budget -= 1;
                } else {
                    while (noDualWield.includes(non_dual_catch)) {
                        non_dual_catch = smallWeapons[Math.floor(Math.random() * smallWeapons.length)];
                    }
                    first_weapon = "Dual " + non_dual_catch;
                    weapon_slot_budget -= 2;
                }
            } else if (first_weapon_type === 2) {
                first_weapon = mediumWeapons[Math.floor(Math.random() * mediumWeapons.length)];
                weapon_slot_budget -= 2;
            } else {
                first_weapon = largeWeapons[Math.floor(Math.random() * largeWeapons.length)];
                weapon_slot_budget -= 3;
            }

            if (weapon_slot_budget === 3) {
                second_weapon = largeWeapons[Math.floor(Math.random() * largeWeapons.length)];
            } else if (weapon_slot_budget === 2) {
                const med_or_small = Math.floor(Math.random() * 2) + 1;
                if (med_or_small === 1) {
                    const dual = Math.floor(Math.random() * 2);
                    let non_dual_catch2 = smallWeapons[Math.floor(Math.random() * smallWeapons.length)];
                    
                    if (dual === 0) {
                        second_weapon = non_dual_catch2;
                    } else {
                        while (noDualWield.includes(non_dual_catch2)) {
                            non_dual_catch2 = smallWeapons[Math.floor(Math.random() * smallWeapons.length)];
                        }
                        second_weapon = "Dual " + non_dual_catch2;
                    }
                } else {
                    second_weapon = mediumWeapons[Math.floor(Math.random() * mediumWeapons.length)];
                }
            } else if (weapon_slot_budget === 1) {
                second_weapon = smallWeapons[Math.floor(Math.random() * smallWeapons.length)];
            }

            // Generate tools and consumables
            const tools_holster = [];
            const consumables_holster = [];
            
            while (tools_holster.length < 4) {
                const newTool = Math.floor(Math.random() * tools.length);
                if (!tools_holster.includes(newTool)) tools_holster.push(newTool);
            }
            
            while (consumables_holster.length < 4) {
                const newConsumable = Math.floor(Math.random() * consumables.length);
                if (!consumables_holster.includes(newConsumable)) consumables_holster.push(newConsumable);
            }

            const tools_output = tools_holster.map(index => tools[index]).join(', ');
            const consumables_output = consumables_holster.map(index => consumables[index]).join(', ');

            const outputHTML = `
                <h1>HUNT SHOWDOWN LOADOUT</h1>
                <p>Primary Weapon: ${first_weapon}</p>
                <p>Secondary Weapon: ${second_weapon}</p>
                <p>Consumables: ${consumables_output}</p>
                <p>Tools: ${tools_output}</p>
                <h2>Good luck, Hunter!</h2>
            `;

            document.getElementById('loadout').innerHTML = outputHTML;
        }

        // Generate initial loadout on page load
        generateLoadout();
    </script>
</body>
</html>
