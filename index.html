<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Project Hub</title>

<style>

/* Page styling */

body{
    font-family: Arial, sans-serif;
    background:#1e1e1e;
    color:white;
    text-align:center;
    margin:0;
    padding:0;
}

/* Header */

header{
    background:#111;
    padding:20px;
    font-size:28px;
}

/* Container for project links */

.container{
    display:flex;
    flex-direction:column;
    align-items:center;
    margin-top:40px;
}

/* Project buttons */

.project{
    width:250px;
    padding:15px;
    margin:10px;
    background:#2c2c2c;
    border-radius:10px;
    text-decoration:none;
    color:white;
    font-size:18px;
    transition:background 0.2s, transform 0.05s;
    cursor:pointer;
}

/* Hover effect */

.project:hover{
    background:#3a3a3a;
}

/* Click effect */

.project:active{
    transform:translateY(2px);
}

</style>

</head>

<body>

<header>
Project Navigation
</header>

<div class="container">

<a class="project" href="TTRPGTravelCalculator.html">
TTRPG Travel Calculator
    [GPT Coded]
</a>

<a class="project" href="HuntLoadoutGenerator.html">
Hunt Loadout Generator
</a>

</div>

</body>


</html>
