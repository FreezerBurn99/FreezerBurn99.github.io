<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TTRPG Travel Time Calculator</title>

<style>
/*
Simple styling so the calculator is readable on desktop and mobile
*/
body{
    font-family: Arial, sans-serif;
    background:#1e1e1e;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:#2c2c2c;
    padding:25px;
    border-radius:10px;
    width:300px;
}

input, select, button{
    width:100%;
    margin-top:10px;
    padding:8px;
    border-radius:5px;
    border:none;
}

button{
    background:#4CAF50;
    color:white;
    font-weight:bold;
    cursor:pointer;
    transition: background 0.2s;
}

button:hover{
    background:#45a049;
}

button:active{
    background:#3e8e41;
    transform: translateY(2px);
}

.result{
    margin-top:15px;
    font-size:18px;
}
</style>
</head>

<body>

<div class="container">

<h2>TTRPG Travel Calculator</h2>

<input id="speed" placeholder="Speed per Round">

<input id="distance" placeholder="Distance">
<select id="distanceUnit">
<option value="FEET">Feet</option>
<option value="MILES">Miles</option>
</select>

<input id="maxHours" placeholder="Max Hours per Day">

<select id="unit">
<option value="ROUNDS">Rounds</option>
<option value="MINUTES">Minutes</option>
<option value="HOURS">Hours</option>
<option value="DAYS">Days</option>
</select>

<button type="button" onclick="calculate()">Calculate</button>

<div class="result" id="result">Result</div>

</div>

<script>

/*
This JavaScript section replicates the same logic
used in the Android TravelCalculator class.

Everything runs locally in the browser.
No network calls are made.
*/

const ROUND_SECONDS = 6;
const FEET_PER_MILE = 5280;

/*
Main calculator function triggered by the button.
Reads input values from the HTML form,
performs the calculation, and updates the page.
*/

function calculate(){

    let speed = parseFloat(document.getElementById("speed").value);
    let distance = parseFloat(document.getElementById("distance").value);
    let maxHours = parseFloat(document.getElementById("maxHours").value);

    let unit = document.getElementById("unit").value;
    let distanceUnit = document.getElementById("distanceUnit").value;

    if(isNaN(speed) || isNaN(distance) || isNaN(maxHours) || speed <= 0){
        document.getElementById("result").innerText = 
        "Please enter valid numbers.";
        return;
    }

    if(distanceUnit === "MILES"){
        distance = distance * FEET_PER_MILE;
    }

    let rounds = distance / speed;

    let result;

    switch(unit){

        case "ROUNDS":
            result = rounds;
            break;

        case "MINUTES":
            result = (rounds * ROUND_SECONDS) / 60;
            break;

        case "HOURS":
            result = (rounds * ROUND_SECONDS) / 3600;
            break;

        case "DAYS":
            const hours = (rounds * ROUND_SECONDS) / 3600;
            result = hours / maxHours;
            break;

        default:
            result = rounds;
    }

    document.getElementById("result").innerText =
        "Travel Time: " + result + " " + unit;
}

</script>

</body>
</html>
